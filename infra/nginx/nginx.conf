worker_processes auto;

events {
    worker_connections 256;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip — reduces payload for JS/CSS on slow WiFi
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/javascript
        image/svg+xml;

    # Allow uploads up to 55 MB (50 MB video + overhead)
    client_max_body_size 55M;

    # Upstream services (Docker internal DNS)
    upstream web_upstream {
        server web:3000;
        keepalive 16;
    }

    upstream api_upstream {
        server api:4000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── Static uploads (images, videos attached to questions) ──────────
        # Served directly by Nginx from the shared Docker volume — avoids
        # going through Node.js for static binary content.
        location /uploads/ {
            alias /uploads/;
            expires 7d;
            add_header Cache-Control "public, must-revalidate";
            add_header X-Content-Type-Options nosniff;

            # Security: only allow media types used by the app
            location ~* \.(jpg|jpeg|png|webp|gif|mp4)$ {
                expires 30d;
                add_header Cache-Control "public, immutable";
            }

            # Block anything else (no scripts from upload dir)
            location ~* \.(html|js|css|php)$ {
                deny all;
            }
        }

        # ── Socket.io (WebSocket + polling fallback) ───────────────────────
        # Must come before the generic /api/ block because Socket.io
        # uses a specific path and needs the Upgrade headers set.
        location /socket.io/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Long timeout for persistent WebSocket connections (game session ~2h)
            proxy_read_timeout    7200s;
            proxy_send_timeout    7200s;
            proxy_connect_timeout 10s;
        }

        # ── REST API ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout    30s;
            proxy_connect_timeout 10s;
        }

        # ── Next.js (web app + HMR in case of dev override) ───────────────
        location / {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;

            # Required for Next.js Server-Sent Events (RSC streaming)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_read_timeout 60s;
        }
    }
}
